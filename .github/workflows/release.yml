name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: false
        default: auto
        type: choice
        options: [auto, patch, minor, major]

permissions:
  contents: write

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml

  release:
    name: Tag, build, publish
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version
        id: bump
        run: |
          # Latest semver tag, default to v0.0.0
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          LATEST=${LATEST:-v0.0.0}
          MAJOR=$(echo $LATEST | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)

          BUMP="${{ github.event.inputs.bump }}"
          if [ "$BUMP" = "" ] || [ "$BUMP" = "auto" ]; then
            # Derive bump from commit messages since last tag
            COMMITS=$(git log ${LATEST}..HEAD --pretty=%s 2>/dev/null || git log --pretty=%s)
            if echo "$COMMITS" | grep -qiE '\[major\]|BREAKING.CHANGE'; then
              BUMP=major
            elif echo "$COMMITS" | grep -qiE '\[minor\]|^feat(\(.+\))?:'; then
              BUMP=minor
            else
              BUMP=patch
            fi
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Bumping $LATEST → $VERSION ($BUMP)"

      - name: Push version tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.bump.outputs.version }}
          git push origin ${{ steps.bump.outputs.version }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portlandtoday:${{ steps.bump.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/portlandtoday:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          body: |
            ## Docker image

            ```
            bkero/portlandtoday:${{ steps.bump.outputs.version }}
            bkero/portlandtoday:${{ steps.bump.outputs.version }}@${{ steps.push.outputs.digest }}
            ```

            To deploy, update the image in `portlandtoday.yaml.tpl`:
            ```yaml
            image: bkero/portlandtoday:${{ steps.bump.outputs.version }}@${{ steps.push.outputs.digest }}
            ```
