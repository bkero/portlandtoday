name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:

jobs:
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high

  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Check JS syntax
        run: node --check server.js database.js rss-manager.js app.js

  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Start server and verify /healthz
        run: |
          node server.js &
          SERVER_PID=$!
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000/healthz; then
              echo "Server is healthy"
              kill $SERVER_PID
              exit 0
            fi
            sleep 1
          done
          kill $SERVER_PID 2>/dev/null
          echo "Server did not become healthy in time"
          exit 1

  docker-scan:
    name: Docker build + Trivy scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: portlandtoday:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: portlandtoday:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
